<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | All Around Sneakers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .signup-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--primary) 100%);
      display: flex;
      flex-direction: column;
    }
    
    .signup-header {
      padding: 40px 30px 20px;
      text-align: center;
    }
    
    .brand-logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-light);
      text-decoration: none;
      letter-spacing: -2px;
      margin-bottom: 10px;
    }
    
    .brand-logo span {
      color: var(--accent);
    }
    
    .tagline {
      color: var(--gray);
      font-size: 0.95rem;
    }
    
    .signup-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 30px 40px;
    }
    
    .signup-form {
      background: var(--primary);
      border-radius: 15px;
      padding: 40px;
      box-shadow: var(--shadow);
      max-width: 450px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .signup-form h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 30px;
      text-align: center;
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--gray);
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .form-control {
      width: 100%;
      padding: 14px 15px 14px 45px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      color: #333333;
      font-size: 1rem;
      transition: all 0.3s;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.1);
    }
    
    .form-control::placeholder {
      color: #666666;
    }
    
    .form-control.select {
      padding-left: 45px;
      appearance: none;
      cursor: pointer;
    }
    
    .form-control.select option {
      background: #ffffff;
      color: #333333;
    }
    
    .input-icon {
      position: relative;
    }
    
    .input-icon i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      z-index: 1;
    }
    
    .btn-primary-custom {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--text-light);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      margin-bottom: 20px;
    }
    
    .btn-primary-custom:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    
    .login-link {
      text-align: center;
      color: var(--gray);
      font-size: 0.9rem;
    }
    
    .login-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }
    
    .login-link a:hover {
      color: var(--accent-hover);
    }
    
    .alert {
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    
    .alert-danger {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 5px;
      z-index: 2;
      transition: color 0.3s;
    }
    
    .password-toggle:hover {
      color: var(--accent);
    }
    
    .password-toggle i {
      font-size: 1rem;
    }
  </style>
</head>
<body class="signup-page" style="background-image: url('AllAroundSneakerShop.gif'); background-position: center center; background-size: cover; background-attachment: fixed; background-repeat: no-repeat;">
  <div class="signup-header">
    <a href="#" class="brand-logo">All<span>Around</span></a>
    <p class="tagline">Join South Africa's premier sneaker community</p>
  </div>

  <div class="signup-container">
    <form class="signup-form" onsubmit="handleSignup(event)">
      <h2>Create Account</h2>

      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" name="full_name" id="full_name" class="form-control" placeholder="Enter your full name" required>
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <div class="input-icon">
          <i class="fas fa-at"></i>
          <input type="text" name="username" id="username" class="form-control" placeholder="Choose a username" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" id="password" class="form-control" placeholder="Create a password (min 6 chars)" required minlength="6">
          <button type="button" class="password-toggle" onclick="togglePassword('password')">
            <i class="fas fa-eye" id="password-toggle-icon"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Confirm your password" required>
          <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')">
            <i class="fas fa-eye" id="confirm_password-toggle-icon"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Account Type</label>
        <div class="input-icon">
          <i class="fas fa-user-tag"></i>
          <select name="role" id="role" class="form-control select" required>
            <option value="customer">Customer - Buy Sneakers</option>
            <option value="seller">Seller - Sell Sneakers</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom">Create Account</button>

      <p class="login-link">
        Already have an account? <a href="index.html">Sign In</a>
      </p>
    </form>
  </div>

  <script src="auth.js"></script>
  <script>
    // Password match validation
    document.getElementById('confirm_password').addEventListener('input', function() {
      const password = document.getElementById('password').value;
      const confirm = this.value;
      
      if (password !== confirm) {
        this.style.borderColor = '#dc3545';
      } else {
        this.style.borderColor = '#28a745';
      }
    });
    
    function handleSignup(event) {
      event.preventDefault();
      
      const formData = {
        fullName: document.getElementById('full_name').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
      
      // Validate passwords match
      if (formData.password !== document.getElementById('confirm_password').value) {
        auth.showError('Passwords do not match');
        return;
      }
      
      const result = auth.register(formData);
      
      if (result.success) {
        auth.showSuccess('Account created successfully! Redirecting to login...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      } else {
        auth.showError(result.error);
      }
    }
    
    function togglePassword(fieldId) {
      const passwordField = document.getElementById(fieldId);
      const toggleIcon = document.getElementById(fieldId + '-toggle-icon');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.className = 'fas fa-eye-slash';
      } else {
        passwordField.type = 'password';
        toggleIcon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
