<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | All Around Sneakers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--primary) 100%);
      display: flex;
      flex-direction: column;
    }
    
    .login-header {
      padding: 60px 30px 30px;
      text-align: center;
    }
    
    .brand-logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text-light);
      text-decoration: none;
      letter-spacing: -2px;
      margin-bottom: 10px;
    }
    
    .brand-logo span {
      color: var(--accent);
    }
    
    .tagline {
      color: var(--gray);
      font-size: 0.95rem;
    }
    
    .login-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 30px 40px;
    }
    
    .login-form {
      background: var(--primary);
      border-radius: 15px;
      padding: 40px;
      box-shadow: var(--shadow);
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .login-form h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 30px;
      text-align: center;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--gray);
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .form-control {
      width: 100%;
      padding: 15px 15px 15px 45px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      color: #333333;
      font-size: 1rem;
      transition: all 0.3s;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.1);
    }
    
    .form-control::placeholder {
      color: #666666;
    }
    
    .input-icon {
      position: relative;
    }
    
    .input-icon i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      z-index: 1;
    }
    
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    
    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray);
    }
    
    .form-check input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    
    .forgot-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }
    
    .forgot-link:hover {
      color: var(--accent-hover);
    }
    
    .btn-primary-custom {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--text-light);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    
    .btn-primary-custom:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: var(--gray);
      font-size: 0.85rem;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    
    .divider span {
      padding: 0 15px;
    }
    
    .social-login {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .btn-social {
      flex: 1;
      padding: 12px;
      background: var(--bg-dark);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    
    .btn-social:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }
    
    .signup-link {
      text-align: center;
      color: var(--gray);
      font-size: 0.9rem;
    }
    
    .signup-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }
    
    .signup-link a:hover {
      color: var(--accent-hover);
    }
    
    .alert {
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    
    .alert-danger {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    
    .alert-success {
      background: rgba(40, 167, 69, 0.2);
      border: 1px solid var(--success);
      color: var(--success);
    }
    
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 5px;
      z-index: 2;
      transition: color 0.3s;
    }
    
    .password-toggle:hover {
      color: var(--accent);
    }
    
    .password-toggle i {
      font-size: 1rem;
    }
  </style>
</head>
<body class="login-page" style="background-image: url('AllAroundSneakerShop.gif'); background-position: center center; background-size: cover; background-attachment: fixed; background-repeat: no-repeat;">
  <div class="login-header">
    <a href="#" class="brand-logo">All<span>Around</span></a>
    <p class="tagline">High-performance engineering meets streetwear culture</p>
  </div>

  <div class="login-container">
    <form class="login-form" onsubmit="handleLogin(event)">
      <h2>Welcome Back</h2>

      <div class="form-group">
        <label>Email or Username</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="text" name="username" id="username" class="form-control" placeholder="Enter your email or username" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
          <button type="button" class="password-toggle" onclick="togglePassword('password')">
            <i class="fas fa-eye" id="password-toggle-icon"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="form-check">
          <input type="checkbox" name="remember" id="remember">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary-custom">Sign In</button>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <div class="social-login">
        <button type="button" class="btn-social" onclick="showSocialLogin('google')">
          <i class="fab fa-google"></i>
          Google
        </button>
        <button type="button" class="btn-social" onclick="showSocialLogin('apple')">
          <i class="fab fa-apple"></i>
          Apple
        </button>
      </div>

      <p class="signup-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </form>
  </div>

  <script src="auth.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      const result = auth.login(username, password, remember);
      
      if (result.success) {
        auth.showSuccess('Login successful! Redirecting...');
        setTimeout(() => {
          auth.redirectBasedOnRole();
        }, 1500);
      } else {
        auth.showError(result.error);
      }
    }
    
    function showForgotPassword() {
      auth.showError('Password reset feature coming soon. Contact admin@allaroundsneakers.com');
    }
    
    function showSocialLogin(provider) {
      auth.showError(`${provider} login feature coming soon. Please use email/password.`);
    }
    
    function togglePassword(fieldId) {
      const passwordField = document.getElementById(fieldId);
      const toggleIcon = document.getElementById(fieldId + '-toggle-icon');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.className = 'fas fa-eye-slash';
      } else {
        passwordField.type = 'password';
        toggleIcon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
